<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurd-Arena | خۆتۆمارکردن</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="logo">KURD<span>ARENA</span></h1>
            <h2>هەژمارێکی نوێ دروست بکە</h2>
            <form id="signup-form">
                <input type="text" id="username" placeholder="ناوی بەکارهێنەر" required>
                <input type="email" id="email" placeholder="ئیمەیڵ" required>
                <input type="password" id="password" placeholder="وشەی نهێنی (لانی کەم ٦ پیت)" required>
                <button type="submit" class="gold-btn">دروستکردنی ئەکاونت</button>
            </form>
            <p id="message"></p>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
